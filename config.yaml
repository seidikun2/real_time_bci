experiment:
  subject_id:      "TT000"
  session_id:      1
  log_root:        "C:/Users/User/Desktop/Dados"
  exp_name:        "TEST"
  session_type:    "IM_treino"   # valor base; o main muda por etapa

lsl:
  marker_name:     "GrazMI_Markers"
  marker_type:     "Markers"
  signal_name:     "gHIamp_EEG"
  signal_type:     "EEG"

runtime:
  simulate_signal: true           # true = TX simulado + RX; false = apenas RX/hardware real

# ----------------- PROTOCOLO -----------------
# O fluxo agora é controlado pelo main:
# 1) treino EM
# 2) treino IM
# 3) calibração
# 4) online
# Cada bloco termina quando o PsychoPy envia block_end_code.
protocol:
  block_end_code:       99
  block_end_label:      "BLOCK_END"

  motor_session_type:   "EM_treino"
  imagery_session_type: "IM_treino"
  online_session_type:  "IM_online"
  model_session_type:   "IM_treino"

# ----------------- SINAL SIMULADO (TX) -----------------
sim_signal:
  fs:              128.0
  channels:        16
  chunk:           10
  noise_std:       0.8

sim_burst:
  freq:            10.0
  amp:             1.5
  dur:             3.5
  taper_frac:      0.2

sim_profiles:
  left_mi:         [1.0, 0.3]
  right_mi:        [0.3, 1.0]

codes:
  left_mi:         3
  right_mi:        4
  attempt:         5
  block_end:       99
  map:
    "1":           "BASELINE"
    "2":           "ATTENTION"
    "3":           "LEFT_MI_STIM"
    "4":           "RIGHT_MI_STIM"
    "5":           "ATTEMPT"
    "6":           "REST"
    "99":          "BLOCK_END"

# ----------------- CALIBRAÇÃO DO DECODER -----------------
model:
  fs_hz:           128.0
  bp_order:        4
  bp_band:         [5.0, 50.0]
  epoch_s:         2.5
  trial_offset_s:  0.5
  pca_dim:         2
  svc_c:           1.0
  rng_seed:        42
  cv_splits:       5

  select_by:       "index"
  index_base:      1
  select_channels: []

# ----------------- CHECK_DATA -----------------
check_data:
  select_channels: [1, 2, 4, 5, 7, 9, 10]
  hp_cutoff_hz:    0.5
  hp_order:        4
  classes:         ["LEFT_MI_STIM", "RIGHT_MI_STIM"]
  tmin:            -0.5
  tmax:            3.75
  baseline_s:      0.0
  save_png:        true

# ----------------- DECODER EM TEMPO REAL -----------------
decoder:
  epoch_s:         2.5
  step_s:          0.05
  band_hz:         [5.0, 50.0]
  filter_order:    4
  outlet_name:     "Signal"
  lsl_rate_hz:     50.0
  left_label:      null
  right_label:     null
